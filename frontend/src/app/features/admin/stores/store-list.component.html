<h1 class="page-title">Mağazalar</h1>

<div class="toolbar">
  <label>
    Durum Filtresi
    <select [(ngModel)]="statusFilter" (change)="onFilterChange()">
      <option value="">Tümü</option>
      @for (status of statusOptions; track status) {
        <option [value]="status">{{ status }}</option>
      }
    </select>
  </label>
</div>

@if (loading()) {
  <app-loading-spinner />
} @else if (error()) {
  <app-error-state message="Liste yüklenemedi." (retry)="load()" />
} @else {
  <div class="table-card">
    <table class="ec-table">
      <thead>
        <tr>
          <th>Mağaza Adı</th>
          <th>E-posta</th>
          <th>Durum</th>
          <th style="text-align:center">Ürün</th>
          <th>Durum Değiştir</th>
        </tr>
      </thead>
      <tbody>
        @for (store of items(); track store.id) {
          <tr>
            <td><a class="store-link" [routerLink]="['/admin/stores', store.id]">{{ store.name }}</a></td>
            <td style="font-size:.82rem;color:var(--text-secondary)">{{ store.contactEmail }}</td>
            <td><span [class]="'status-badge s-' + store.status">{{ store.status }}</span></td>
            <td style="text-align:center;font-weight:600">{{ store.productCount ?? '-' }}</td>
            <td>
              <select class="sm" [value]="store.status" (change)="changeStatus(store, $event)">
                @for (status of statusOptions; track status) {
                  <option [value]="status">{{ status }}</option>
                }
              </select>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  <app-pagination [currentPage]="page()" [totalPages]="totalPages()" (pageChange)="onPage($event)" />
}
