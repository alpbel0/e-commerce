<h2>Magazalar</h2>

<div class="filters">
  <label>
    Durum
    <select [(ngModel)]="statusFilter" (change)="onFilterChange()">
      <option value="">Tumu</option>
      @for (status of statusOptions; track status) {
        <option [value]="status">{{ status }}</option>
      }
    </select>
  </label>
</div>

@if (loading()) {
  <app-loading-spinner />
} @else if (error()) {
  <app-error-state message="Liste yuklenemedi." (retry)="load()" />
} @else {
  <table>
    <thead>
      <tr>
        <th>Ad</th>
        <th>E-posta</th>
        <th>Durum</th>
        <th>Urun</th>
        <th>Yeni durum</th>
      </tr>
    </thead>
    <tbody>
      @for (store of items(); track store.id) {
        <tr>
          <td><a [routerLink]="['/admin/stores', store.id]" style="color:#2563eb;text-decoration:none">{{ store.name }}</a></td>
          <td>{{ store.contactEmail }}</td>
          <td>{{ store.status }}</td>
          <td>{{ store.productCount ?? '-' }}</td>
          <td>
            <select class="sm" [value]="store.status" (change)="changeStatus(store, $event)">
              @for (status of statusOptions; track status) {
                <option [value]="status">{{ status }}</option>
              }
            </select>
          </td>
        </tr>
      }
    </tbody>
  </table>
  <app-pagination [currentPage]="page()" [totalPages]="totalPages()" (pageChange)="onPage($event)" />
}
