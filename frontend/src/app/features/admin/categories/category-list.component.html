<h2>Kategoriler</h2>

<div class="create">
  <h3 style="margin:0 0 8px;font-size:0.95rem">Yeni kategori</h3>
  <form [formGroup]="createForm" (ngSubmit)="create()">
    <div class="row">
      <div>
        <label>Ad</label>
        <input formControlName="name" />
      </div>
      <div>
        <label>Sira</label>
        <input type="number" formControlName="displayOrder" />
      </div>
    </div>
    <label>Aciklama</label>
    <textarea rows="2" formControlName="description"></textarea>
    <div class="check">
      <input type="checkbox" id="act" formControlName="active" />
      <label for="act" style="margin:0">Aktif</label>
    </div>
    <button type="submit" [disabled]="saving()">Ekle</button>
  </form>
</div>

@if (loading()) {
  <app-loading-spinner />
} @else if (error()) {
  <app-error-state message="Liste yuklenemedi." (retry)="load()" />
} @else {
  <table>
    <thead>
      <tr>
        <th>Ad</th>
        <th>Slug</th>
        <th>Aktif</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (category of items(); track category.id) {
        <tr>
          <td>
            <a [routerLink]="['/admin/categories', category.id]" style="color:#2563eb;text-decoration:none;margin-right:8px">
              {{ category.name }}
            </a>
            <input class="inline" [value]="category.name" (blur)="patchField(category, 'name', $event)" />
          </td>
          <td>{{ category.slug }}</td>
          <td>
            <input type="checkbox" [checked]="category.active" (change)="patchField(category, 'active', $event)" />
          </td>
          <td>
            <button type="button" class="warn" (click)="askDelete(category)">Sil</button>
          </td>
        </tr>
      }
    </tbody>
  </table>
}

<app-confirm-dialog
  [open]="deleteOpen()"
  title="Kategoriyi sil"
  [message]="(deleteTarget()?.name ?? '') + ' silinsin mi?'"
  confirmLabel="Sil"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()"
/>
