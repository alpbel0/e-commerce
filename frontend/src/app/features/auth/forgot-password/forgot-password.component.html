@if (!success) {
  <h1 class="fp-title">Şifreni mi unuttun?</h1>
  <p class="fp-subtitle">E-posta adresinizi girin, şifre sıfırlama bağlantısı gönderelim.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="fp-form" novalidate>
    <div class="field">
      <label class="field__label" for="email">E-posta adresi</label>
      <div class="field__input-wrap">
        <svg class="field__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="ornek@sirket.com"
        />
      </div>
    </div>

    <button type="submit" class="submit-btn" [disabled]="submitting">
      @if (submitting) {
        <span class="submit-btn__spinner"></span>
        Gönderiliyor...
      } @else {
        Sıfırlama Bağlantısı Gönder
      }
    </button>
  </form>
} @else {
  <div class="success-card animate-fade-in-up">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">Bağlantı Gönderildi!</div>
    <p class="success-text">E-posta adresinize şifre sıfırlama bağlantısı gönderdik. Gelen kutunuzu kontrol edin.</p>
  </div>
}

<p class="fp-footer">
  <a routerLink="/auth/login" class="fp-footer__link">← Giriş sayfasına dön</a>
</p>
