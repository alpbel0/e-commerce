<h2>Şifremi unuttum</h2>
@if (!success) {
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="email">E-posta</label>
      <input id="email" type="email" formControlName="email" autocomplete="email" />
    </div>
    <button type="submit" [disabled]="submitting">Gönder</button>
  </form>
} @else {
  <p class="ok">Şifre sıfırlama linki gönderildi.</p>
}
<p class="hint"><a routerLink="/auth/login">Girişe dön</a></p>
